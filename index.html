    border-radius: 2px;

}

/* Animasi Loading Spinner Google */
.captcha-spinner {
    display: none;

    top: 0; left: 0;
    width: 24px;
    height: 24px;
    border: 3px solid #4d90fe;
    border-top: 3px solid transparent;
    border-radius: 50%;
    z-index: 2;
    animation: spin 1s linear infinite;
}

.checkmark {

    height: 14px;
    border: solid #00aa4f;
    border-width: 0 3px 3px 0;
    transform: rotate(45deg);
    z-index: 2;
}

@keyframes spin {

    100% { transform: rotate(360deg); }
